name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Build webreplica
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          version="${version//\//-}"
          package="webreplica_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${package}"
          go build -trimpath -ldflags="-s -w" -o "dist/${package}/webreplica${{ matrix.ext }}" ./cmd/webreplica
          cp README.md "dist/${package}/README.md"
          if [ "$GOOS" = "windows" ]; then
            cp scripts/install.ps1 "dist/${package}/install.ps1"
          else
            cp scripts/install.sh "dist/${package}/install.sh"
            chmod +x "dist/${package}/install.sh"
          fi
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: webreplica-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/webreplica_*_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          find . -maxdepth 1 -type f -name 'webreplica_*' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/webreplica_*
            release-artifacts/SHA256SUMS.txt
          generate_release_notes: true
