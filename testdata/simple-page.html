<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Example Product</title>
    <meta name="description" content="A simple example landing page for testing Siteforge." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="canonical" href="https://example.com/" />
  </head>
  <body>
    <header>
      <nav>
        <a href="#features">Features</a>
        <a href="#pricing">Pricing</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h1>Launch better product sites</h1>
        <p>Create modern landing pages without copying protected content.</p>
        <button>Get started</button>
      </section>
      <section id="features">
        <article class="card feature">
          <h2>Fast setup</h2>
          <p>Spin up a presentable experience in minutes.</p>
        </article>
      </section>
      <form action="/signup" method="post">
        <label>Email <input type="email" name="email" placeholder="name@example.com" /></label>
        <button type="submit">Join waitlist</button>
      </form>
      <img src="/images/hero.png" alt="Illustration of a product dashboard" width="1200" height="800" />
    </main>
    <footer>
      <a href="/terms">Terms</a>
    </footer>
  </body>
</html>
